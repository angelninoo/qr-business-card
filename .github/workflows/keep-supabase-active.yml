name: Keep Supabase Active

on:
  schedule:
    - cron: "30 8 * * 1,4"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl -s "https://iwxsjhcddzcsiwpkajum.supabase.co/rest/v1/business_cards?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"